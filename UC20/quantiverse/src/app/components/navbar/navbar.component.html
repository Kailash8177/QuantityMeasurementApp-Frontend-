<nav class="topbar">
  <div class="topbar-brand">QUANTI<span>VERSE</span></div>
  <div class="topbar-nav">
    <a class="nav-btn" routerLink="/calculator" routerLinkActive="active">🧮 <span>CALCULATOR</span></a>
    <a class="nav-btn" routerLink="/history"    routerLinkActive="active">📜 <span>HISTORY</span></a>
    <a class="nav-btn" routerLink="/profile"    routerLinkActive="active">👤 <span>PROFILE</span></a>
  </div>
  <div class="topbar-auth">
    <div class="auth-trigger-btns" *ngIf="!loggedIn">
      <button class="btn-ghost" (click)="openLogin()">LOGIN</button>
      <button class="btn-ghost accent" (click)="openRegister()">REGISTER</button>
    </div>
    <div class="user-chip" *ngIf="loggedIn">
      <div class="avatar-sm">{{ initials }}</div>
      <span class="user-name">{{ userName }}</span>
      <button class="logout-btn" (click)="logout()" title="Logout">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</nav>
